name: Deploy to GitHub Pages                                                                                                                                                                              
on:                                                                                                      
  push:                                                                                                  
    branches: [main, 'gravity-pong', 'claude/**']                                                        
  workflow_dispatch:                                                                                     
                                                                                                          
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/wasm-pack
            engine/target
          key: wasm-build-${{ hashFiles('engine/Cargo.lock') }}
          restore-keys: wasm-build-

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked || true

      - name: Build WASM
        working-directory: engine
        run: wasm-pack build --target web --release crates/engine-core --out-dir ../../../_pkg

      - name: Verify WASM build output
        run: ls -la _pkg/engine_core.js _pkg/engine_core_bg.wasm

      - name: Generate HTML docs from markdown
        run: bash scripts/build-docs.sh

      - name: Assemble site
        run: |
          mkdir -p _site/pkg _site/demo-ball _site/docs

          # Copy WASM build artifacts
          cp _pkg/engine_core.js _site/pkg/
          cp _pkg/engine_core_bg.wasm _site/pkg/

          # Copy site pages
          cp site/index.html _site/

          # Copy bouncing ball demo
          cp site/demo-ball/index.html _site/demo-ball/

          # Copy shared assets (JS modules, CSS)
          cp site/browser-state.js _site/
          cp site/crusty-ui.css _site/
          [ -f site/crusty-ui.js ] && cp site/crusty-ui.js _site/ || true

          # Copy all game demos (gravity-pong, chord-reps, etc.)
  
          for demo_dir in site/gravity-pong* site/chord-reps; do
            [ -d "$demo_dir" ] || continue
            name=$(basename "$demo_dir")
            mkdir -p "_site/$name"
            cp "$demo_dir"/*.html "_site/$name/"
          done

          # Copy generated docs (built from docs/*.md by build-docs.sh)
          cp site/docs/*.html _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
