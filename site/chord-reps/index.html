<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <title>Chord Reps — Anki for your ears</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #0a0a1e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
        }
        h1 { display: none; }
        #game-canvas {
            cursor: pointer;
            display: block;
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
        }
        #attribution {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: auto;
            font-size: 0.75rem;
            color: #aa88aa;
            letter-spacing: 0.04em;
            text-align: center;
            background: rgba(10, 10, 30, 0.7);
            padding: 4px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 102, 178, 0.15);
        }
        #attribution a {
            color: #ff66b2;
            text-decoration: none;
        }
        #attribution a:hover {
            color: #00d4aa;
            text-decoration: underline;
        }
        .info { display: none; }
        a { color: #00d4aa; }
        .version {
            position: fixed;
            bottom: 6px;
            right: 10px;
            color: #333;
            font-size: 0.6rem;
            letter-spacing: 0.05em;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <script src="https://surikov.github.io/webaudiofont/npm/dist/WebAudioFontPlayer.js"></script>
    <script src="https://surikov.github.io/webaudiofontdata/sound/0000_JCLive_sf2_file.js"></script>
    <script type="module">
    import { initBrowserState } from '../browser-state.js';
    // =========================================================================
    //  CHORD REPS — WebGL2 Renderer + Web Audio Sound Engine
    //  Pipeline: Upload WASM framebuffer → Glow → Bloom → Composite
    // =========================================================================

    // --- WASM Import ---
    const WASM_VER = '__WASM_HASH__';
    const cacheBust = WASM_VER.startsWith('__') ? '' : `?v=${WASM_VER}`;

    const { default: initWasm, ...api } = await import(`../pkg/engine_core.js${cacheBust}`);
    const {
        init, tick,
        framebuffer_ptr, framebuffer_len,
        mouse_move, mouse_down, mouse_up,
        touch_start, touch_move, touch_end,
        key_down, key_up,
        drain_sound_commands,
        drain_persist_commands,
        set_game_state_str,
        setup_chord_reps,
        set_url_param,
        browser_state_ptr, browser_state_len
    } = api;

    // --- Adaptive Resolution ---
    // Framebuffer adapts to viewport: H=900 reference, W scales with aspect ratio.
    // Cap total pixels to ~810K for software rendering performance.
    const REF_H = 900;
    const vw0 = window.innerWidth, vh0 = window.innerHeight;
    const H = REF_H;
    const W = Math.max(400, Math.round(H * (vw0 / vh0)));
    const canvas = document.getElementById('game-canvas');
    canvas.width = W;
    canvas.height = H;

    // --- Full-screen canvas (no letterboxing) ---
    function resizeCanvas() {
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        canvas.style.left = '0';
        canvas.style.top = '0';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);


    // --- WebGL2 Init ---
    const gl = canvas.getContext('webgl2', {
        alpha: false,
        antialias: false,
        premultipliedAlpha: false,
        preserveDrawingBuffer: false,
        powerPreference: 'high-performance'
    });

    if (!gl) {
        document.body.innerHTML = '<p style="color:#f44;padding:2em;">WebGL2 not supported. Please use a modern browser.</p>';
        throw new Error('WebGL2 not available');
    }

    // --- Web Audio + Sample Engine ---
    let audioCtx = null;
    let masterCompressor = null;
    let player = null;
    function ensureAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterCompressor = audioCtx.createDynamicsCompressor();
            masterCompressor.threshold.value = -12;
            masterCompressor.knee.value = 10;
            masterCompressor.ratio.value = 4;
            masterCompressor.attack.value = 0.003;
            masterCompressor.release.value = 0.1;
            masterCompressor.connect(audioCtx.destination);
            player = new WebAudioFontPlayer();
            player.adjustPreset(audioCtx, _tone_0000_JCLive_sf2_file);
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }


    canvas.addEventListener('click', ensureAudio, { once: false });
    canvas.addEventListener('touchstart', ensureAudio, { once: false });

    function handleSoundCommands() {
        if (!audioCtx) return;
        const json = drain_sound_commands();
        if (json === '[]') return;

        let cmds;
        try { cmds = JSON.parse(json); } catch { return; }

        for (const cmd of cmds) {
            if (cmd.type === 'PlayTone') {
                playTone(cmd.frequency, cmd.duration, cmd.volume, cmd.waveform, cmd.attack, cmd.decay);
            } else if (cmd.type === 'PlayNoise') {
                playNoise(cmd.duration, cmd.volume, cmd.filter_freq);
            } else if (cmd.type === 'PlayNote') {
                playNote(cmd.note, cmd.duration, cmd.volume, cmd.instrument);
            }
        }
    }

    function handlePersistCommands() {
        const json = drain_persist_commands();
        if (json === '[]') return;
        let cmds;
        try { cmds = JSON.parse(json); } catch { return; }
        for (const cmd of cmds) {
            if (cmd.type === 'Store') {
                localStorage.setItem('crusty_mt_' + cmd.key, cmd.value);
            } else if (cmd.type === 'OpenUrl') {
                window.open(cmd.url, '_blank', 'noopener');
            }
        }
    }


    function playNote(note, duration, volume, instrument) {
        try {
            if (!player) return;
            player.queueWaveTable(
                audioCtx, masterCompressor,
                _tone_0000_JCLive_sf2_file,
                audioCtx.currentTime,
                note, duration, volume
            );
        } catch (e) {}
    }

    function playTone(freq, duration, volume, waveform, attack, decay) {
        try {
            const osc = audioCtx.createOscillator();
            osc.type = waveform || 'sine';
            osc.frequency.value = freq;

            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            const fadeIn = Math.max(attack, 0.005);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(volume, now + fadeIn);
            gain.gain.setTargetAtTime(volume * 0.3, now + fadeIn, decay * 0.3);
            const endTime = now + fadeIn + decay;
            gain.gain.setTargetAtTime(0.0001, now + fadeIn + decay * 0.6, decay * 0.4);
            gain.gain.linearRampToValueAtTime(0.0001, endTime + 0.05);

            osc.connect(gain);
            gain.connect(masterCompressor || audioCtx.destination);

            osc.start(now);
            osc.stop(endTime + 0.1);
        } catch (e) {}
    }

    function playNoise(duration, volume, filterFreq) {
        try {
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const source = audioCtx.createBufferSource();
            source.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = filterFreq;

            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            gain.gain.setValueAtTime(volume, now);
            gain.gain.linearRampToValueAtTime(0, now + duration);

            source.connect(filter);
            filter.connect(gain);
            gain.connect(masterCompressor || audioCtx.destination);

            source.start(now);
            source.stop(now + duration + 0.05);
        } catch (e) {
            // Ignore audio errors
        }
    }

    // --- Shader Sources ---

    const FULLSCREEN_VS = `#version 300 es
    precision highp float;
    out vec2 vUv;
    void main() {
        float x = float((gl_VertexID & 1) << 2);
        float y = float((gl_VertexID & 2) << 1);
        vUv = vec2(x * 0.5, y * 0.5);
        gl_Position = vec4(x - 1.0, y - 1.0, 0.0, 1.0);
    }`;

    const BLOOM_THRESHOLD_FS = `#version 300 es
    precision highp float;
    in vec2 vUv;
    out vec4 fragColor;
    uniform sampler2D uScene;
    uniform float uThreshold;
    void main() {
        vec4 c = texture(uScene, vUv);
        float brightness = dot(c.rgb, vec3(0.2126, 0.7152, 0.0722));
        float contrib = max(brightness - uThreshold, 0.0);
        fragColor = vec4(c.rgb * (contrib / max(brightness, 0.001)), 1.0);
    }`;

    const BLUR_FS = `#version 300 es
    precision highp float;
    in vec2 vUv;
    out vec4 fragColor;
    uniform sampler2D uTex;
    uniform vec2 uDirection;
    void main() {
        float weights[5] = float[](0.227027, 0.1945946, 0.1216216, 0.054054, 0.016216);
        vec3 result = texture(uTex, vUv).rgb * weights[0];
        for (int i = 1; i < 5; i++) {
            vec2 off = uDirection * float(i);
            result += texture(uTex, vUv + off).rgb * weights[i];
            result += texture(uTex, vUv - off).rgb * weights[i];
        }
        fragColor = vec4(result, 1.0);
    }`;

    // Themed composite: bloom + chromatic aberration + scanlines + vignette
    const COMPOSITE_FS = `#version 300 es
    precision highp float;
    in vec2 vUv;
    out vec4 fragColor;

    uniform sampler2D uScene;
    uniform sampler2D uBloom;
    uniform float uTime;
    uniform float uBloomIntensity;
    uniform float uVignetteStrength;
    uniform float uScanlineIntensity;
    uniform float uChromaticAberration;

    void main() {
        vec2 uv = vUv;

        // Chromatic aberration (subtle neon feel)
        vec2 caOffset = (uv - 0.5) * uChromaticAberration;
        float r = texture(uScene, uv + caOffset).r;
        float g = texture(uScene, uv).g;
        float b = texture(uScene, uv - caOffset).b;
        vec3 scene = vec3(r, g, b);

        // Add bloom
        vec3 bloom = texture(uBloom, vUv).rgb;
        scene += bloom * uBloomIntensity;

        // Scanlines (subtle horizontal lines)
        float scanline = sin(uv.y * float(${H}) * 3.14159) * 0.5 + 0.5;
        scanline = mix(1.0, scanline, uScanlineIntensity);
        scene *= scanline;

        // Vignette
        vec2 vigUv = uv - 0.5;
        float vigDist = dot(vigUv, vigUv);
        float vignette = 1.0 - vigDist * uVignetteStrength;
        scene *= clamp(vignette, 0.0, 1.0);

        // Subtle warm glow
        scene = pow(scene, vec3(0.96));

        fragColor = vec4(scene, 1.0);
    }`;

    // Glow pass: bright-pixel spread
    const GLOW_FS = `#version 300 es
    precision highp float;
    in vec2 vUv;
    out vec4 fragColor;
    uniform sampler2D uScene;
    uniform float uGlowRadius;
    uniform float uGlowIntensity;
    void main() {
        vec4 center = texture(uScene, vUv);
        float brightness = dot(center.rgb, vec3(0.2126, 0.7152, 0.0722));

        if (brightness < 0.25) {
            fragColor = center;
            return;
        }

        vec2 texelSize = 1.0 / vec2(textureSize(uScene, 0));
        vec3 glow = vec3(0.0);
        float totalWeight = 0.0;

        for (float i = -3.0; i <= 3.0; i += 1.0) {
            for (float j = -3.0; j <= 3.0; j += 1.0) {
                float w = exp(-(i*i + j*j) / (2.0 * uGlowRadius * uGlowRadius));
                vec2 offset = vec2(i, j) * texelSize * 2.0;
                vec3 s = texture(uScene, vUv + offset).rgb;
                float sb = dot(s, vec3(0.2126, 0.7152, 0.0722));
                glow += s * w * step(0.25, sb);
                totalWeight += w;
            }
        }

        glow /= totalWeight;
        fragColor = vec4(center.rgb + glow * uGlowIntensity, 1.0);
    }`;

    // --- Shader Compilation ---

    function compileShader(type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            const info = gl.getShaderInfoLog(shader);
            gl.deleteShader(shader);
            throw new Error(`Shader compile error: ${info}`);
        }
        return shader;
    }

    function createProgram(vsSource, fsSource) {
        const vs = compileShader(gl.VERTEX_SHADER, vsSource);
        const fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
        const prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
            const info = gl.getProgramInfoLog(prog);
            throw new Error(`Program link error: ${info}`);
        }
        const uniforms = {};
        const count = gl.getProgramParameter(prog, gl.ACTIVE_UNIFORMS);
        for (let i = 0; i < count; i++) {
            const info = gl.getActiveUniform(prog, i);
            uniforms[info.name] = gl.getUniformLocation(prog, info.name);
        }
        return { program: prog, uniforms };
    }

    // --- Create Programs ---
    const bloomThresholdProg = createProgram(FULLSCREEN_VS, BLOOM_THRESHOLD_FS);
    const blurProg = createProgram(FULLSCREEN_VS, BLUR_FS);
    const compositeProg = createProgram(FULLSCREEN_VS, COMPOSITE_FS);
    const glowProg = createProgram(FULLSCREEN_VS, GLOW_FS);

    // --- Textures & FBOs ---

    function createTexture(w, h, filter) {
        const tex = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        return tex;
    }

    function createFBO(tex) {
        const fbo = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
        return fbo;
    }

    const sceneTex = createTexture(W, H, gl.NEAREST);

    const BLOOM_W = Math.floor(W / 4);
    const BLOOM_H = Math.floor(H / 4);
    const bloomThreshTex = createTexture(BLOOM_W, BLOOM_H, gl.LINEAR);
    const bloomThreshFBO = createFBO(bloomThreshTex);
    const bloomBlurATex = createTexture(BLOOM_W, BLOOM_H, gl.LINEAR);
    const bloomBlurAFBO = createFBO(bloomBlurATex);
    const bloomBlurBTex = createTexture(BLOOM_W, BLOOM_H, gl.LINEAR);
    const bloomBlurBFBO = createFBO(bloomBlurBTex);

    const glowTex = createTexture(W, H, gl.LINEAR);
    const glowFBO = createFBO(glowTex);

    const vao = gl.createVertexArray();

    function drawFullscreen() {
        gl.bindVertexArray(vao);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
    }

    // --- Input ---
    function toEngine(pageX, pageY) {
        const r = canvas.getBoundingClientRect();
        return [
            (pageX - r.left) / r.width  * W,
            (pageY - r.top)  / r.height * H
        ];
    }

    canvas.addEventListener('mousemove', e => {
        const [x, y] = toEngine(e.clientX, e.clientY);
        mouse_move(x, y);
    });
    canvas.addEventListener('mousedown', e => {
        const [x, y] = toEngine(e.clientX, e.clientY);
        mouse_down(x, y, e.button);
    });
    canvas.addEventListener('mouseup', e => {
        const [x, y] = toEngine(e.clientX, e.clientY);
        mouse_up(x, y, e.button);
    });

    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            const [x, y] = toEngine(t.clientX, t.clientY);
            touch_start(t.identifier, x, y);
        }
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            const [x, y] = toEngine(t.clientX, t.clientY);
            touch_move(t.identifier, x, y);
        }
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            const [x, y] = toEngine(t.clientX, t.clientY);
            touch_end(t.identifier, x, y);
        }
    }, { passive: false });

    window.addEventListener('keydown', e => key_down(e.code));
    window.addEventListener('keyup', e => key_up(e.code));

    // --- Effect Parameters ---
    const FX = {
        bloomThreshold: 0.35,
        bloomIntensity: 0.7,
        bloomPasses: 3,
        vignetteStrength: 1.5,
        scanlineIntensity: 0.04,
        chromaticAberration: 0.0015,
        glowRadius: 2.0,
        glowIntensity: 0.5,
    };

    // --- Main Loop ---
    async function main() {
        const wasm = await initWasm();
        const memory = wasm.memory;

        init(W, H);

        // Push URL query parameters into the engine
        for (const [k, v] of new URLSearchParams(location.search)) {
            set_url_param(k, v);
        }

        // Restore SRS state from localStorage before setup
        const savedSrs = localStorage.getItem('crusty_mt_srs');
        if (savedSrs) set_game_state_str('srs_state', savedSrs);

        setup_chord_reps();

        // Browser → WASM shared state (viewport, touch detection, etc.)
        const updateBrowserState = initBrowserState(memory, browser_state_ptr, browser_state_len, {
            canvasSizeFn: function() {
                return { w: parseFloat(canvas.style.width) || W, h: parseFloat(canvas.style.height) || H };
            }
        });

        let last = performance.now();
        let totalTime = 0;

        function frame(now) {
            const dt = now - last;
            last = now;
            totalTime += dt * 0.001;

            // --- Update Browser State (before tick so WASM sees current values) ---
            updateBrowserState(dt);

            // --- Engine Tick ---
            tick(dt);

            // --- Drain Sound Commands ---
            handleSoundCommands();

            // --- Drain Persist Commands ---
            handlePersistCommands();

            // --- Upload WASM Framebuffer ---
            const ptr = framebuffer_ptr();
            const len = framebuffer_len();
            const pixels = new Uint8Array(memory.buffer, ptr, len);

            gl.bindTexture(gl.TEXTURE_2D, sceneTex);
            gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
            gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, W, H, gl.RGBA, gl.UNSIGNED_BYTE, pixels);
            gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);

            // ==== PASS 1: Glow ====
            gl.bindFramebuffer(gl.FRAMEBUFFER, glowFBO);
            gl.viewport(0, 0, W, H);
            gl.useProgram(glowProg.program);
            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, sceneTex);
            gl.uniform1i(glowProg.uniforms['uScene'], 0);
            gl.uniform1f(glowProg.uniforms['uGlowRadius'], FX.glowRadius);
            gl.uniform1f(glowProg.uniforms['uGlowIntensity'], FX.glowIntensity);
            drawFullscreen();

            // ==== PASS 2: Bloom Threshold ====
            gl.bindFramebuffer(gl.FRAMEBUFFER, bloomThreshFBO);
            gl.viewport(0, 0, BLOOM_W, BLOOM_H);
            gl.useProgram(bloomThresholdProg.program);
            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, glowTex);
            gl.uniform1i(bloomThresholdProg.uniforms['uScene'], 0);
            gl.uniform1f(bloomThresholdProg.uniforms['uThreshold'], FX.bloomThreshold);
            drawFullscreen();

            // ==== PASS 3: Bloom Blur (ping-pong) ====
            let readTex = bloomThreshTex;
            for (let pass = 0; pass < FX.bloomPasses; pass++) {
                // Horizontal
                gl.bindFramebuffer(gl.FRAMEBUFFER, bloomBlurAFBO);
                gl.viewport(0, 0, BLOOM_W, BLOOM_H);
                gl.useProgram(blurProg.program);
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, readTex);
                gl.uniform1i(blurProg.uniforms['uTex'], 0);
                gl.uniform2f(blurProg.uniforms['uDirection'], 1.0 / BLOOM_W, 0.0);
                drawFullscreen();

                // Vertical
                gl.bindFramebuffer(gl.FRAMEBUFFER, bloomBlurBFBO);
                gl.viewport(0, 0, BLOOM_W, BLOOM_H);
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, bloomBlurATex);
                gl.uniform2f(blurProg.uniforms['uDirection'], 0.0, 1.0 / BLOOM_H);
                drawFullscreen();

                readTex = bloomBlurBTex;
            }

            // ==== PASS 4: Final Composite ====
            gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            gl.viewport(0, 0, W, H);
            gl.useProgram(compositeProg.program);

            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, glowTex);
            gl.uniform1i(compositeProg.uniforms['uScene'], 0);

            gl.activeTexture(gl.TEXTURE1);
            gl.bindTexture(gl.TEXTURE_2D, bloomBlurBTex);
            gl.uniform1i(compositeProg.uniforms['uBloom'], 1);

            gl.uniform1f(compositeProg.uniforms['uTime'], totalTime);
            gl.uniform1f(compositeProg.uniforms['uBloomIntensity'], FX.bloomIntensity);
            gl.uniform1f(compositeProg.uniforms['uVignetteStrength'], FX.vignetteStrength);
            gl.uniform1f(compositeProg.uniforms['uScanlineIntensity'], FX.scanlineIntensity);
            gl.uniform1f(compositeProg.uniforms['uChromaticAberration'], FX.chromaticAberration);

            drawFullscreen();

            requestAnimationFrame(frame);
        }

        requestAnimationFrame(frame);
    }

    main();
    </script>
