<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Crusty Engine Demos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d14;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 40px;
        }
        h1 { font-size: 2rem; color: #f0e060; }
        .games {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }
        a.card {
            display: block;
            width: 300px;
            padding: 28px 24px;
            background: #1a1a28;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            text-decoration: none;
            color: #e0e0e0;
            transition: border-color 0.2s, transform 0.2s;
        }
        a.card:hover {
            border-color: #f0e060;
            transform: translateY(-2px);
        }
        a.card h2 { color: #f0e060; margin-bottom: 8px; font-size: 1.2rem; }
        a.card p { color: #888; font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>Crusty Engine</h1>
    <div class="games">
        <a class="card" href="game-1/">
            <h2>Bouncing Balls</h2>
            <p>10 colorful balls bounce and collide. Click any ball to freeze it in midair. Click again to release.</p>
        </a>
        <a class="card" href="game-2/">
            <h2>Walker</h2>
            <p>Move a character with arrow keys through a world of shapes. Collide with everything, pass through nothing.</p>
        </a>
    </div>
</body>
</html>
